<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Inventory Management System - Part1</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📦 Inventory Management System</h1>
            <p>TypeScript Implementation | Pure front-end memory storage</p>
        </header>

    
        <div class="form-card">
            <h2 id="formTitle">➕ Add product</h2>
            <form id="productForm">
                <div class="form-row">
                    <div class="form-group">
                        <label>commodity ID *</label>
                        <input type="text" id="id" placeholder="unique identifier" required>
                    </div>
                    <div class="form-group">
                        <label>Product Name *</label>
                        <input type="text" id="name" placeholder="Product Name" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>category *</label>
                        <select id="category" required>
                            <option value="electronic products">electronic products</option>
                            <option value="furniture">furniture</option>
                            <option value="clothing">clothing</option>
                            <option value="tool">tool</option>
                            <option value="miscellaneous">miscellaneous</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>quantity *</label>
                        <input type="number" id="quantity" min="0" value="0" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>price *</label>
                        <input type="number" id="price" min="0" step="0.01" value="0" required>
                    </div>
                    <div class="form-group">
                        <label>supplier *</label>
                        <input type="text" id="supplier" placeholder="Supplier Name" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Inventory Status *</label>
                        <select id="stockStatus" required>
                            <option value="in stock">in stock</option>
                            <option value="Low inventory">Low inventory</option>
                            <option value="out of stock">out of stock</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Hot items *</label>
                        <select id="hotItem" required>
                            <option value="是">Yes</option>
                            <option value="否">No</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>Product Comments</label>
                    <textarea id="comments" rows="2" placeholder="Optional comments"></textarea>
                </div>
                <div class="button-group">
                    <button type="submit" id="submitBtn">Add Product</button>
                    <button type="button" id="cancelEditBtn" style="display:none;">Cancel Edit</button>
                </div>
            </form>
        </div>

        <!-- Search Bar -->
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="🔍 Search by product name...">
            <button id="searchBtn">Search</button>
            <button id="resetSearchBtn">Show All</button>
            <button id="showHotBtn">🔥 Hot Products</button>
        </div>

        <!-- Message Area (replaces alert) -->
        <div id="messageArea" class="message-area"></div>

        <!-- Product List -->
        <div class="inventory-list">
            <h2>📋 Product List</h2>
            <div id="productListContainer" class="product-cards">
                <!-- Dynamic card rendering -->
            </div>
        </div>
    </div>

    <!-- Import compiled JavaScript -->
    <script src="main.js"></script>
</body>
</html>
